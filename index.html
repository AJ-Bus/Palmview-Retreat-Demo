<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>PalmView AI Bot</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      background: #f0f8ff;
      color: #333;
    }

    .hero {
      background: url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1470&q=80') no-repeat center/cover;
      height: 220px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      text-shadow: 0 0 5px rgba(0,0,0,0.6);
      margin-bottom: 20px;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin: 0;
    }

    .hero p {
      font-size: 1.2rem;
      margin: 5px 0 0;
    }

    /* Floating chat button */
    #chatbot-toggle {
      position: fixed;
      bottom: 25px;
      right: 25px;
      background-color: #0078d4;
      border: none;
      border-radius: 50%;
      width: 60px;
      height: 60px;
      font-size: 30px;
      color: white;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      z-index: 1000;
    }

    /* Chatbot window */
    #chatbot {
      position: fixed;
      bottom: 90px;
      right: 25px;
      width: 320px;
      max-height: 420px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 1000;
    }

    #chatbot-header {
      background: #0078d4;
      color: white;
      padding: 12px;
      font-weight: bold;
      text-align: center;
    }

    #chatbot-messages {
      flex: 1;
      padding: 10px;
      overflow-y: auto;
      font-size: 0.9rem;
    }

    .message {
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 18px;
      max-width: 80%;
      clear: both;
    }

    .user-message {
      background-color: #e0e0e0;
      float: right;
      text-align: right;
    }

    .bot-message {
      background-color: #0078d4;
      color: white;
      float: left;
      text-align: left;
    }

    #chatbot-input-container {
      display: flex;
      border-top: 1px solid #ccc;
    }

    #chatbot-input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      font-size: 1rem;
    }

    #chatbot-send {
      background: #0078d4;
      border: none;
      color: white;
      padding: 0 20px;
      cursor: pointer;
      font-size: 1rem;
    }
  </style>
</head>
<body>

  <div class="hero">
    <h1>PalmView Retreat Hotel</h1>
    <p>Your tranquil escape in Chiang Mai, Thailand</p>
  </div>

  <!-- Floating Chat Button -->
  <button id="chatbot-toggle" title="Chat with us!">💬</button>

  <!-- Chatbot Window -->
  <div id="chatbot" aria-live="polite" aria-atomic="true" role="log">
    <div id="chatbot-header">PalmView Assistant</div>
    <div id="chatbot-messages" aria-label="Chat messages"></div>
    <div id="chatbot-input-container">
      <input id="chatbot-input" type="text" placeholder="Ask something..." aria-label="Chat input" autocomplete="off" />
      <button id="chatbot-send" aria-label="Send message">Send</button>
    </div>
  </div>

  <script>
    const chatbotToggle = document.getElementById('chatbot-toggle');
    const chatbot = document.getElementById('chatbot');
    const chatbotMessages = document.getElementById('chatbot-messages');
    const chatbotInput = document.getElementById('chatbot-input');
    const chatbotSend = document.getElementById('chatbot-send');

    // Toggle chat window visibility
    chatbotToggle.addEventListener('click', () => {
      if (chatbot.style.display === 'flex') {
        chatbot.style.display = 'none';
      } else {
        chatbot.style.display = 'flex';
        chatbotInput.focus();
      }
    });

    // Function to append messages
    function appendMessage(text, sender) {
      const msg = document.createElement('div');
      msg.classList.add('message');
      msg.classList.add(sender === 'user' ? 'user-message' : 'bot-message');
      msg.textContent = text;
      chatbotMessages.appendChild(msg);
      chatbotMessages.scrollTop = chatbotMessages.scrollHeight;
    }

    // Send message and fetch reply
    async function sendChatMessage(message) {
      appendMessage(message, 'user');
      appendMessage('Thinking...', 'bot');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const data = await res.json();

        // Remove the "Thinking..." message
        chatbotMessages.lastChild.remove();

        if (data.reply) {
          appendMessage(data.reply, 'bot');
        } else {
          appendMessage('Sorry, no response from the server.', 'bot');
        }
      } catch (error) {
        chatbotMessages.lastChild.remove();
        appendMessage('Oops, something went wrong.', 'bot');
        console.error(error);
      }
    }

    // Send message on button click
    chatbotSend.addEventListener('click', () => {
      const message = chatbotInput.value.trim();
      if (!message) return;
      sendChatMessage(message);
      chatbotInput.value = '';
      chatbotInput.focus();
    });

    // Send message on Enter key
    chatbotInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        chatbotSend.click();
      }
    });
  </script>
</body>
</html>
